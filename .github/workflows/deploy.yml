name: Deploy StonkBiz NFT

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "baseSepolia"
        type: choice
        options:
          - baseSepolia
          - baseMainnet
  push:
    branches: [main]
    # By default, push to main deploys to Base Sepolia (testnet).
    # To deploy to mainnet, use workflow_dispatch.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Deploy to ${{ github.event.inputs.network || 'baseSepolia' }}
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: npx hardhat run scripts/deploy.js --network ${{ github.event.inputs.network || 'baseSepolia' }}
