name: Deploy StonkBiz NFT

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "baseSepolia"
        type: choice
        options:
          - baseSepolia
          - baseMainnet

jobs:
  full-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Generate NFT collection
        run: node scripts/generate-collection.js

      - name: Prepare metadata for GitHub Pages
        env:
          IMAGES_CID: QmSp5c3uNQG2wH42u8yFuMimfcuQpEahw1DDXLPg1nan9e
        run: node scripts/upload-metadata-only.js

      - name: Commit metadata to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Add generated metadata for GitHub Pages"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy and configure contract
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: npx hardhat run scripts/deploy.js --network ${{ github.event.inputs.network || 'baseSepolia' }}

      - name: Upload generated files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nft-output
          path: output/
