name: Deploy StonkBiz NFT

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "baseSepolia"
        type: choice
        options:
          - baseSepolia
          - baseMainnet

jobs:
  full-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Generate NFT collection
        run: node scripts/generate-collection.js

      - name: Upload metadata to Filebase
        env:
          FILEBASE_ACCESS_KEY: ${{ secrets.FILEBASE_ACCESS_KEY }}
          FILEBASE_SECRET_KEY: ${{ secrets.FILEBASE_SECRET_KEY }}
          IMAGES_CID: QmSp5c3uNQG2wH42u8yFuMimfcuQpEahw1DDXLPg1nan9e
        run: node scripts/upload-metadata-only.js

      - name: Deploy and configure contract
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: npx hardhat run scripts/deploy.js --network ${{ github.event.inputs.network || 'baseSepolia' }}

      - name: Upload generated files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nft-output
          path: output/
