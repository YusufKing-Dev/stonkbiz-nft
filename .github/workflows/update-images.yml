name: Update NFT Image URLs

on:
  workflow_dispatch:

jobs:
  update-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update image field in all metadata files
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = './docs/metadata';
          const imageUrl = 'https://yusufking-dev.github.io/stonkbiz-nft/base.png';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
          let count = 0;
          for (const file of files) {
            const filePath = path.join(dir, file);
            const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            data.image = imageUrl;
            fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
            count++;
          }
          console.log('Updated ' + count + ' files');
          "

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/metadata
          git diff --staged --quiet || git commit -m "Update image field in all NFT metadata"
          git push
