name: Delete All Pinata Files

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all pinned files
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          node << 'EOF'
          const https = require("https");

          async function request(method, path, body) {
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: "api.pinata.cloud",
                path,
                method,
                headers: {
                  Authorization: `Bearer ${process.env.PINATA_JWT}`,
                  "Content-Type": "application/json",
                },
              }, (res) => {
                let data = "";
                res.on("data", c => data += c);
                res.on("end", () => resolve(JSON.parse(data)));
              });
              req.on("error", reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          async function main() {
            let deleted = 0;
            while (true) {
              const res = await request("GET", "/pinning/pinList?status=pinned&pageLimit=100");
              const rows = res.rows || [];
              if (rows.length === 0) break;
              for (const pin of rows) {
                await request("DELETE", `/pinning/unpin/${pin.ipfs_pin_hash}`);
                deleted++;
                if (deleted % 50 === 0) console.log(`Deleted ${deleted} files...`);
              }
            }
            console.log(`Done! Total deleted: ${deleted}`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
